name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version & publish
    runs-on: ubuntu-latest
    permissions:
      contents: write       # open the "Version Packages" PR + push tags
      pull-requests: write  # open & update the version PR
      id-token: write       # OIDC trusted-publisher flow + provenance signing

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm to 11.5+ for trusted-publisher OIDC
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check package drift (README + manifest fields)
        run: pnpm check:packages

      - name: Build packages
        run: pnpm -r build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm exec changeset publish
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
